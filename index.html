<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f2ec">
    <title>Tests DGT móvil</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Permiso B</p>
          <h1>Tests DGT móvil</h1>
        </div>
        <button class="icon-button" id="resetBtn" type="button" aria-label="Reiniciar test" title="Reiniciar">↺</button>
      </header>

      <main class="test-layout" aria-live="polite">
        <section class="control-strip">
          <label class="select-label" for="testSelect">Test</label>
          <select id="testSelect"></select>
          <div class="status-pill" id="statusPill">Cargando</div>
        </section>

        <section class="question-panel" id="questionPanel">
          <div class="loading">Cargando test...</div>
        </section>

        <nav class="bottom-actions" aria-label="Navegación del test">
          <button class="secondary-button" id="prevBtn" type="button">Anterior</button>
          <button class="primary-button" id="nextBtn" type="button">Siguiente</button>
          <button class="finish-button" id="finishBtn" type="button">Finalizar</button>
        </nav>

        <section class="question-map" id="questionMap" aria-label="Preguntas"></section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
